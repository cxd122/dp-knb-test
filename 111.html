<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DP KNB Test Page</title>
</head>
<body>
    <h2>DP KNB 桥接测试页</h2>
    <div id="log"></div>

    <script>
        const logDiv = document.getElementById('log');
        function log(msg, type='info') {
            const p = document.createElement('div');
            p.style.color = type === 'success' ? 'green' : type === 'fail' ? 'red' : 'black';
            p.textContent = msg;
            logDiv.appendChild(p);
            console.log(msg);
        }

        // 1. 环境伪装
        window.Owl.cfgManager.set({
            isInApp: true,
            platform: 'ios',
            appName: 'dianping',
            devMode: true,
            debug: true,
            enableDebugLog: true
        });
        log("当前是否APP内环境: " + window.Owl.cfgManager.get('isInApp'));
        log("当前调试模式状态: " + window.Owl.cfgManager.get('devMode'));

        // 2. KNB桥接封装
        function callKNB(method, params = {}) {
            const bridge = window.KNBCore || window.DPApp || window.KNB;
            if (!bridge) {
                log('未找到KNB桥接对象', 'fail');
                return Promise.reject('No bridge');
            }
            log(`调用KNB方法: ${method}`);
            return new Promise((resolve, reject) => {
                bridge.sendMessage(method, params, {
                    success: (res) => {
                        log(`[+] ${method} 调用成功: ${JSON.stringify(res)}`, 'success');
                        resolve(res);
                    },
                    fail: (err) => {
                        log(`[-] ${method} 调用失败: ${JSON.stringify(err)}`, 'fail');
                        reject(err);
                    }
                });
            });
        }

        // 3. 批量测试
        async function runTests() {
            log("===== 开始KNB测试 =====");
            await callKNB('getUserInfo');
            await callKNB('getLocation', { accuracy: 'high' });
            await callKNB('openSchema', { url: 'dianping://user/wallet' });
            log("===== 测试完成 =====");
        }

        runTests();
    </script>
</body>
</html>
